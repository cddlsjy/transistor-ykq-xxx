name: Build Android APK 

on: 
  push: 
    branches: [ master ] 
  workflow_dispatch: 

env: 
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs: 
  build: 
    runs-on: ubuntu-latest 
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v4 

      # 1. 设置 JDK 17，并明确保存路径 
      - name: Set up JDK 17 
        id: setup-java 
        uses: actions/setup-java@v4 
        with: 
          java-version: '17' 
          distribution: 'temurin' 
          cache: 'gradle' 

      # 2. 将 JAVA_HOME 写入环境，确保所有步骤使用 JDK 17 
      - name: Set JAVA_HOME globally 
        run: echo "JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> $GITHUB_ENV 

      # 3. 验证 Java 版本 
      - name: Verify Java 
        run: | 
          echo "JAVA_HOME: $JAVA_HOME" 
          java -version 

      # 4. 安装指定版本的 Gradle（例如 8.9）并缓存 
      - name: Setup Gradle 
        uses: gradle/actions/setup-gradle@v3 
        with: 
          gradle-version: '8.9'   # 可改为 8.7, 8.8, 8.9 等 

      # 5. 使用 gradle 命令直接构建（不需要 gradlew） 
      - name: Build APK 
        run: gradle assembleDebug --stacktrace --no-daemon 

      # 6. 查找并上传 APK 
      - name: Find and upload APK 
        id: find_apk 
        run: | 
          APK_PATH=$(find . -path "*/outputs/apk/debug/*.apk" -print -quit) 
          if [ -z "$APK_PATH" ]; then 
            echo "❌ No APK found" 
            find . -type f -name "*.apk" 2>/dev/null || true 
            exit 1 
          fi 
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT 

      - name: Upload APK 
        uses: actions/upload-artifact@v4 
        with: 
          name: app-debug 
          path: ${{ steps.find_apk.outputs.apk_path }}